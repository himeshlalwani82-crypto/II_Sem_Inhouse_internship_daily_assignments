<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLINEFORM</title>
</head>
<body>
    <p>REFISTRATION FORM</p>
<form>
    NAME:
    <input type="text"><br><br>
</form>
<form>
    CLASS:
    <input type="text"><br><br>
</form>
<form>
    DEPARTMENT:
    <input type="text"><br><br>
</form>
<form>
    PHONE NO:
    <input type="number" pattern="[0-9]*"><br><br>
</form>
<form>
    <label for="phone">PHONE NO:</label><br>
    <img width="450" height="250" src="image.png" alt="">
<input
    type="tel"
    id="phone"
    name="phone"
    pattern="[0-9]{10}"
    maxlength="10"
    placeholder="Enter 10-digit number"
    required>
</form>
