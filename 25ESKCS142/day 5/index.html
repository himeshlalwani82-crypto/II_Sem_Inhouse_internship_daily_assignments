<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory | jQuery Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🎓 Student Directory</div>
    </header>

    <main class="container">
        <div class="student-grid">
            
            <div class="card invisible-on-load">
                <div class="card-header">
                    <div class="avatar">👨‍💻</div>
                    <h3>Alex Rivera</h3>
                    <p class="meta">Computer Science | Senior</p>
                </div>
                
                <div class="details">
                    <p><strong>GPA:</strong> 3.8 / 4.0</p>
                    <p><strong>Focus:</strong> Full-Stack Development & AI Systems</p>
                    <p><strong>Email:</strong> alex.rivera@university.edu</p>
                </div>
                
                <button class="btn btn-details">Show Details</button>
            </div>

            <div class="card invisible-on-load">
                <div class="card-header">
                    <div class="avatar">👩‍🔬</div>
                    <h3>Sarah Chen</h3>
                    <p class="meta">Bioengineering | Junior</p>
                </div>
                
                <div class="details">
                    <p><strong>GPA:</strong> 3.95 / 4.0</p>
                    <p><strong>Focus:</strong> Biomechanics & Machine Learning</p>
                    <p><strong>Email:</strong> schen02@university.edu</p>
                </div>
                
                <button class="btn btn-details">Show Details</button>
            </div>

        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
