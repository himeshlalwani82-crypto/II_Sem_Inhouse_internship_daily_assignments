<script>
    let promise = new Promise(function(resolve, reject) {
       
        let internet=true;
        if(internet){
            resolve("internet is avaialble");
        }
        else{
            reject("internet is not available");
        }
    });
    promise
    .then(function(result){
        console.log(result);
    })
    .catch(function(error){
        console.error(error);
    });
    
</script>
