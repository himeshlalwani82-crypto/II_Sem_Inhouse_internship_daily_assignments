<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>college form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h3>COLLEGE ADMISSION FORM</h3>
    <form>

        <label for="name">FULL NAME:</label><br>
        <input type="text"><br><br>


        <label for="name">DOB:</label><br>
        <input type="date"><br><br>

        <label for="name">SECTION:</label><br>
        <input type="text"><br><br>


        <label for="name">YEAR:</label><br>
        <input type="tel" maxlength="4"><br><br>


        <label for="PHONE">PHONE NO:</label><br>
        <input type="tel" style="color: bisque;" id="phone" pattern="[0-9]{10}" maxlength="10" placeholder="enter 10 digit number"
            required><br><br>

        <label for="name">EMAIL:</label><br>
        <input type="tel" placeholder="himeshlalwani82@gmail.com"><br><br>

        <label for="name">GUARDIAN NAME:</label><br>
        <input type="text"><br><br>
        <label for="name">12th RESULT:</label><br>
        <input type="tel" minlength="0" step="0.01" pattern="{1,2}" maxlength="99.99"><br><br>
    </form>

    <input type="submit"><br><br>


    </form>
</body>

</html>
